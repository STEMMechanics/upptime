status-website:
  cname: status.stemmechanics.com.au
  logoUrl: https://raw.githubusercontent.com/STEMMechanics/upptime/master/assets/stemmechanics_logo.png
  name: STEMMechanics
  introTitle: "Service Status"
  introMessage: ""
  css: "nav .logo div {display: none;} footer p {font-size: 0.8rem;}"
  navbar:
    - title: Home
      href: https://www.stemmechanics.com.au/
    - title: Status
      href: /
  js: "document.addEventListener('DOMContentLoaded',function(){const observer = new MutationObserver(function(mutations_list) {mutations_list.forEach(function(mutation) {mutation.removedNodes.forEach(function(removed_node) {if(removed_node.classList.contains('loading') && removed_node.parentNode.classList.contains('live-status')) {console.log('#child has been removed');observer.disconnect();}});});});observer.observe(document.querySelector('body'), { subtree: false, childList: true });});"

